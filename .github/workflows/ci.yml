name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests and coverage check
        run: mvn -B -e clean verify

  deploy:
    name: Deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
          server-id: onestorm
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Build and deploy artifacts
        run: mvn -U -B -e clean deploy
        env:
          MAVEN_USERNAME: github
          MAVEN_PASSWORD: ${{ secrets.REPOSILITE_TOKEN }}

  deploy-development:
    name: Deploy (development build)
    if: github.ref == 'refs/heads/development' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
          server-id: onestorm
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Set build version
        run: |
          BASE_VERSION=$(mvn -q -Dexpression=project.version -DforceStdout help:evaluate)
          mvn -B versions:set -DnewVersion="${BASE_VERSION}-BUILD.${{ github.run_number }}" -DgenerateBackupPoms=false

      - name: Build and deploy artifacts
        run: mvn -U -B -e clean deploy
        env:
          MAVEN_USERNAME: github
          MAVEN_PASSWORD: ${{ secrets.REPOSILITE_TOKEN }}
